backend:
  name: github
  repo: anuragraj12/house-of-vows
  branch: main
  site_url: https://YOUR_USERNAME.github.io/house-of-vows
  base_url: https://YOUR_USERNAME.github.io
  auth_endpoint: https://YOUR_USERNAME.github.io/house-of-vows

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "stories"
    label: "Wedding Stories"
    folder: "_data/stories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Couple Name", name: "couple", widget: "string" }
      - { label: "Cover Image", name: "cover", widget: "image" }
      - { label: "Body (Blog Text)", name: "body", widget: "markdown" }
