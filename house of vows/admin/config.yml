backend:
  name: github
  repo: YOUR_USERNAME/house-of-vows
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "stories"
    label: "Wedding Stories"
    folder: "_data/stories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Couple Name", name: "couple", widget: "string" }
      - { label: "Cover Image", name: "cover", widget: "image" }
      - { label: "Body (Blog Text)", name: "body", widget: "markdown" }
